<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>Avant-Garde</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0b;
        --fg: #f4f4f5;
        --muted: #a1a1aa;
        --line: #27272a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "DM Sans", system-ui, sans-serif;
        background: radial-gradient(
            ellipse 80% 50% at 50% -20%,
            rgba(120, 119, 198, 0.15),
            transparent
          ),
          var(--bg);
        color: var(--fg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
      }
      p {
        max-width: 36rem;
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 1rem;
      }
      .rule {
        width: 3rem;
        height: 1px;
        background: var(--line);
        margin: 1.5rem auto;
      }
    </style>
  </head>
  <body>
    <h1>Avant-Garde</h1>
    <div class="rule" aria-hidden="true"></div>
    <p>
      Site scaffold is live on Firebase Hosting. Replace this page as you
      redesign the experience in Cursor and deploy from GitHub.
    </p>
  </body>
</html>
